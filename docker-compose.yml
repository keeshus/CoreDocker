services:
  backend:
    container_name: core-docker-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_CERTS_PATH:-./nginx/ssl}:/etc/certs:ro
      - ${HOST_BACKUP_PATH:-./data/backup}:/mnt/backup
      - ${HOST_NONBACKUP_PATH:-./data/nonbackup}:/mnt/non-backup
    environment:
      - ETCD_IMAGE=${ETCD_IMAGE:-gcr.io/etcd-development/etcd:v3.6.8}
      - NGINX_IMAGE=${NGINX_IMAGE:-nginx:1.25.4-alpine}
      - ALPINE_IMAGE=${ALPINE_IMAGE:-alpine:3.19}
      - DNS_PRODUCTION=false
      - NODE_DOMAIN=${NODE_DOMAIN:-node-1.local}
      - NODE_IP=${NODE_IP:-127.0.0.1}
      - HOST_BACKUP_PATH=${HOST_BACKUP_PATH:-${PWD}/data/backup}
      - HOST_NONBACKUP_PATH=${HOST_NONBACKUP_PATH:-${PWD}/data/nonbackup}
      - NODE_ID=${NODE_ID}
      - NODE_NAME=${NODE_NAME:-node-1}
      - PORT=${PORT:-3000}
      - CORS_ORIGIN=${CORS_ORIGIN:-true}
      - KEEPALIVED_PASSWORD=${KEEPALIVED_PASSWORD:-c0r3d0ck3r}
      - ETCD_HOSTS=${ETCD_HOSTS:-http://core-docker-etcd:2379}
    group_add:
      - 986 # Host docker group GID
    networks:
      - backhaul
    restart: always
    # Hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run

  frontend:
    container_name: core-docker-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    user: nodejs
    depends_on:
      - backend
    networks:
      - backhaul
    restart: always
    # Hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run

networks:
  web-proxy:
    name: web-proxy
  backhaul:
    name: backhaul
