services:
  backend:
    container_name: core-docker-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - core-docker-backend-data:/app/data
    environment:
      - ETCD_IMAGE=gcr.io/etcd-development/etcd:v3.6.8
      - DNS_PRODUCTION=true
      - NODE_DOMAIN=${NODE_DOMAIN:-node-1.local}
      - NODE_IP=${NODE_IP:-127.0.0.1}
    networks:
      - backhaul
    restart: always
    # Hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run

  frontend:
    container_name: core-docker-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - backhaul
    restart: always
    # Hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run

networks:
  web-proxy:
    name: web-proxy
  backhaul:
    name: backhaul

volumes:
  core-docker-backend-data:
    name: core-docker-backend-data
