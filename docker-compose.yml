services:
  backend:
    container_name: core-docker-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./nginx/conf.d:/app/nginx/conf.d
      - ./nginx/ssl:/app/nginx/ssl
    environment:
      - SECRET_MANAGER_KEY=your_64_character_hex_string_here_edit_me
      - ETCD_IMAGE=quay.io/coreos/etcd:latest
    ports:
      - "3001:3000"
    restart: always

  frontend:
    container_name: core-docker-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:latest
    container_name: core-docker-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - web-proxy
    restart: always

networks:
  web-proxy:
    name: web-proxy
