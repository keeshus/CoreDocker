services:
  backend:
    container_name: core-docker-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./nginx/conf.d:/app/nginx/conf.d
      - ./nginx/ssl:/app/nginx/ssl
    environment:
      - SECRET_MANAGER_KEY=6a656d6f6564657269736c656c696a6b656e67616172832746ab37e98f81a3f1
      - ETCD_IMAGE=gcr.io/etcd-development/etcd:v3.6.8
    networks:
      - backhaul
    restart: always

  frontend:
    container_name: core-docker-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - backhaul
    restart: always

  nginx:
    image: nginx:latest
    container_name: core-docker-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - web-proxy
      - backhaul
    restart: always

networks:
  web-proxy:
    name: web-proxy
  backhaul:
    name: backhaul
