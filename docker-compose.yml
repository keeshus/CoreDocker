services:
  backend:
    container_name: core-docker-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    mem_limit: 512m
    cpus: 1
    pids_limit: 100
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_CERTS_PATH:-./nginx/ssl}:/etc/certs:ro
      - ${HOST_BACKUP_PATH:-./data/backup}:/mnt/backup
      - ${HOST_NONBACKUP_PATH:-./data/nonbackup}:/mnt/non-backup
    environment:
      - ETCD_IMAGE=${ETCD_IMAGE:-gcr.io/etcd-development/etcd:v3.6.8}
      - NGINX_IMAGE=${NGINX_IMAGE:-nginx:1.25.4-alpine}
      - ALPINE_IMAGE=${ALPINE_IMAGE:-alpine:3.19}
      - DNS_FORWARDER=${DNS_FORWARDER:-192.168.1.1}
      - NODE_IP=${NODE_IP:-127.0.0.1}
      - NODE_CLIENT_IP=${NODE_CLIENT_IP}
      - COMPOSE_PROJECT_DIR=${PWD}
      - HOST_BACKUP_PATH=${HOST_BACKUP_PATH:-/mnt/backup}
      - HOST_NONBACKUP_PATH=${HOST_NONBACKUP_PATH:-/mnt/non-backup}
      - DNS_PRODUCTION=${DNS_PRODUCTION:-false}
      - NODE_NAME=${NODE_NAME:-node-1}
      - PORT=${PORT:-3000}
      - CORS_ORIGIN=${CORS_ORIGIN:-true}
      - KEEPALIVED_PASSWORD=${KEEPALIVED_PASSWORD:-c0r3d0ck3r}
      - ETCD_HOSTS=${ETCD_HOSTS:-http://core-docker-etcd:2379}
    group_add:
      - 986 # Host docker group GID
    networks:
      - app-net
    restart: always
    # Hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run

  frontend:
    container_name: core-docker-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 50
    user: nodejs
    depends_on:
      - backend
    networks:
      - app-net
    restart: always
    # Hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run

networks:
  web-proxy:
    name: web-proxy
  app-net:
    name: app-net
