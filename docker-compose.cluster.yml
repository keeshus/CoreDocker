      - SECRET_MANAGER_KEY=6a656d6f6564657269736c656c696a6b656e67616172832746ab37e98f81a3f1
      - ETCD_IMAGE=gcr.io/etcd-development/etcd:v3.6.8
    depends_on:
      - dind-node2
    networks:
      backhaul:
        ipv4_address: 10.0.0.21
    restart: always

  frontend-node2:
    container_name: core-docker-frontend-node2
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend-node2
    networks:
      backhaul:
        ipv4_address: 10.0.0.22
    restart: always

  proxy-node2:
    image: nginx:latest
    container_name: core-docker-proxy-node2
    ports:
      - "8080:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - frontend-node2
      - backend-node2
    networks:
